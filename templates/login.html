<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a24;
      border: 0.5px solid #2e2e3e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #6c63ff;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    label { display: block; color: #888; font-size: 12px; margin-bottom: 6px; letter-spacing: 0.05em; }
    input {
      width: 100%;
      background: #0f0f18;
      border: 0.5px solid #2e2e3e;
      border-radius: 10px;
      padding: 10px 14px;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #6c63ff; }
    input::placeholder { color: #333; }
    button {
      width: 100%;
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #5a52e0; }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #666;
    }
    .footer a { color: #6c63ff; text-decoration: none; }
    .flash { color: #e24b4a; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p class="flash">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
      <label>USERNAME</label>
      <input type="text" name="username" placeholder="Enter your username" required>
      <label>PASSWORD</label>
      <input type="password" name="password" placeholder="Enter your password" required>
      <button type="submit">Sign in</button>
    </form>

    <p class="footer">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>
</body>
</html>
