<!DOCTYPE html>
<html>
<head>
  <title>My To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 40px auto;
      padding: 0 20px;
      background: #eef2f7;
      color: #222;
    }

    .container {
      background: white;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      color: #222;
    }

    .logout {
      text-decoration: none;
      color: white;
      background: #555;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    form {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .task {
      background: #f9fafb;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #e5e7eb;
    }

    .done {
      text-decoration: line-through;
      color: #999;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .actions a {
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: white;
    }

    .complete-btn {
      background: #16a34a;
    }

    .delete-btn {
      background: #dc2626;
    }

    .empty {
      color: #888;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 600px) {
      form {
        flex-direction: column;
      }

      .task {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>My To-Do List</h1>
      <a href="/logout" class="logout">Logout</a>
    </div>

    <form action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." required>
      <button type="submit">Add</button>
    </form>

    {% if tasks %}
      {% for task in tasks %}
        <div class="task">
          <span class="{{ 'done' if task.done else '' }}">{{ task.task }}</span>
          <div class="actions">
            {% if not task.done %}
              <a href="/complete/{{ task.id }}" class="complete-btn">Done</a>
            {% endif %}
            <a href="/delete/{{ task.id }}" class="delete-btn">Delete</a>
          </div>
        </div>
      {% endfor %}
    {% else %}
      <p class="empty">No tasks yet — add one above!</p>
    {% endif %}
  </div>
</body>
</html>
