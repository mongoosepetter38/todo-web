<!DOCTYPE html>
<html>
<head>
  <title>My To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    form { display: flex; gap: 8px; margin-bottom: 20px; }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .task {
      background: white;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #ddd;
    }
    .done { text-decoration: line-through; color: #aaa; }
    .actions { display: flex; gap: 8px; }
    .actions a {
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 13px;
      color: white;
    }
    .complete-btn { background: #2196F3; }
    .delete-btn { background: #f44336; }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>

  <form action="/add" method="POST">
    <input type="text" name="task" placeholder="Add a new task..." required>
    <button type="submit">Add</button>
  </form>

  {% if tasks %}
   {% for task in tasks %}
      <div class="task">
        <span class="{{ 'done' if task.done else '' }}">{{ task.task }}</span>
        <div class="actions">
          {% if not task.done %}
            <a href="/complete/{{ loop.index0 }}" class="complete-btn">Done</a>
          {% endif %}
          <a href="/delete/{{ loop.index0 }}" class="delete-btn">Delete</a>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p style="color: #aaa;">No tasks yet — add one above!</p>
  {% endif %}
</body>
</html>
