<!DOCTYPE html>
<html>
<head>
  <title>My To-Do List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .card {
      background: #1a1a24;
      border: 0.5px solid #2e2e3e;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 700px;
      margin: 40px auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 16px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #6c63ff;
      flex-shrink: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .logout {
      text-decoration: none;
      color: #fff;
      background: #2e2e3e;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }

    .logout:hover {
      background: #3a3a4d;
    }

    form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f0f18;
      border: 0.5px solid #2e2e3e;
      border-radius: 10px;
      padding: 12px 14px;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #6c63ff;
    }

    input::placeholder {
      color: #555;
    }

    button {
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #5a52e0;
    }

    .task {
      background: #0f0f18;
      border: 0.5px solid #2e2e3e;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .task-text {
      font-size: 15px;
      color: #f0f0f0;
    }

    .done {
      text-decoration: line-through;
      color: #666;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .actions a {
      text-decoration: none;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: white;
    }

    .complete-btn {
      background: #16803c;
    }

    .delete-btn {
      background: #e24b4a;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 24px;
      background: #0f0f18;
      border: 0.5px solid #2e2e3e;
      border-radius: 12px;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px;
        margin: 20px auto;
      }

      .top-bar {
        align-items: flex-start;
      }

      form {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .task {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
      }

      .actions a {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <div class="logo-row">
        <div class="logo"></div>
        <div>
          <h1>My To-Do List</h1>
          <p class="subtitle">{{ tasks|length }} task(s)</p>
        </div>
      </div>
      <a href="/logout" class="logout">Logout</a>
    </div>

    <form action="/add" method="POST">
      <input type="text" name="task" placeholder="Add a new task..." required>
      <button type="submit">Add</button>
    </form>

    {% if tasks %}
      {% for task in tasks %}
        <div class="task">
          <span class="task-text {{ 'done' if task.done else '' }}">{{ task.task }}</span>
          <div class="actions">
            {% if not task.done %}
              <a href="/complete/{{ task.id }}" class="complete-btn">Done</a>
            {% endif %}
            <a href="/delete/{{ task.id }}" class="delete-btn">Delete</a>
          </div>
        </div>
      {% endfor %}
    {% else %}
      <p class="empty">No tasks yet — add one above.</p>
    {% endif %}
  </div>
</body>
</html>
